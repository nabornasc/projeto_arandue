<!doctype html>
<!-- faz os navegadores entenderem o documento como HTML5 -->
<html lang="pt-BR">
  <!-- define o idioma do documento, pode ser 'pt-BR' para português do Brasil -->
  <head>
    <meta charset="UTF-8" />
    <!-- define a codificação de caracteres, permite a exibição correta de caracteres especiais -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- define a largura da viewport para corresponder à largura do dispositivo e a escala inicial -->
    <title>Meu Site</title>
    <!-- define o título da página, que aparece na aba do navegador -->
    <link rel="stylesheet" href="./css/styles.css" />
    <!-- vincula um arquivo CSS externo para estilizar a página -->
  </head>

  <body>
    <nav class="navbar">
      <div class="logo">Minha Logo</div>
      <!-- define a área do logotipo da barra de navegação -->

      <ul class="nav-links">
        <li><a href="#">Início</a></li>
        <!-- define um item de navegação que leva à seção "Início" -->
        <li><a href="#">Sobre</a></li>
        <!-- define um item de navegação que leva à seção "Sobre" -->
        <li><a href="#">Serviços</a></li>
        <!-- define um item de navegação que leva à seção "Serviços" -->
        <li><a href="#">Contato</a></li>
        <!-- define um item de navegação que leva à seção "Contato" -->
      </ul>
    </nav>

    <div class="hamburger" id="hamburger">
      <div class="bar"></div>
      <!-- define a primeira barra do ícone de menu hambúrguer -->
      <div class="bar"></div>
      <!-- define a segunda barra do ícone de menu hambúrguer -->
      <div class="bar"></div>
      <!-- define a terceira barra do ícone de menu hambúrguer -->
    </div>

    <script src="./js/script.js"></script>
    <!-- vincula um arquivo JavaScript externo para adicionar interatividade à página -->
  </body>
</html>
